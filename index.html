<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width-device-width, initial-scale=1.0">
  <title>Countdown</title>
  <meta name="description" content="">
  <link rel="icon" href="./img/icons8-clock.svg" type="image/svg+xml">
  <link rel="preload" href="./css/style.css" as="style">
  <link rel="stylesheet" type="text/css" href="./css/style.css">
  <script>document.documentElement.className += " js";</script>
</head>

<body>
  <section class="countdown-container">
    <h1 class="title">ano novo em...</h1>
    <div class="countdown">
      <div>
        <p data-days>0</p>
        <span>dias</span>
      </div>
      <div>
        <p data-hours>0</p>
        <span>horas</span>
      </div>
      <div>
        <p data-minutes>0</p>
        <span>minutos</span>
      </div>
      <div>
        <p data-seconds>0</p>
        <span>segundos</span>
      </div>
    </div>
  </section>

  <script type="module" src="./js/script.js"></script>
</body>

</html>
